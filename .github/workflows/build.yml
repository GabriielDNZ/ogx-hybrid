name: Build Hybrid OGX-Mini + USB-BT-Audio

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  PICO_SDK_VERSION: "2.1.0"

jobs:
  build-bootloader:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake gcc-arm-none-eabi libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib
      - name: Get Pico SDK
        run: git clone --branch ${{ env.PICO_SDK_VERSION }} --recurse-submodules https://github.com/raspberrypi/pico-sdk.git
      - name: Build Bootloader
        env:
          PICO_SDK_PATH: ${{ github.workspace }}/pico-sdk
        run: |
          mkdir -p bootloader/build
          cd bootloader/build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          cmake --build . -j$(nproc)
      - name: Rename output
        run: |
          cd bootloader/build
          cp $(find . -maxdepth 1 -name "*.uf2" | head -n 1) bootloader.uf2
      - name: Upload Bootloader UF2
        uses: actions/upload-artifact@v4
        with:
          name: bootloader-uf2
          path: bootloader/build/bootloader.uf2
          if-no-files-found: error

  build-controller:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake gcc-arm-none-eabi libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib
      - name: Get Pico SDK
        run: git clone --branch ${{ env.PICO_SDK_VERSION }} --recurse-submodules https://github.com/raspberrypi/pico-sdk.git
      - name: Init bluepad32 submodules
        run: |
          rm -rf app-controller/Firmware/external/bluepad32
          git clone --recurse-submodules https://github.com/ricardoquesada/bluepad32.git app-controller/Firmware/external/bluepad32
          rm -rf app-controller/Firmware/external/tinyusb
          git clone --recurse-submodules https://github.com/hathach/tinyusb.git app-controller/Firmware/external/tinyusb
          rm -rf app-controller/Firmware/external/libfixmath
          git clone https://github.com/PetteriAimonen/libfixmath.git app-controller/Firmware/external/libfixmath
          rm -rf app-controller/Firmware/external/Pico-PIO-USB
          git clone https://github.com/wiredopposite/Pico-PIO-USB.git app-controller/Firmware/external/Pico-PIO-USB
      - name: Build App - Controller
        env:
          PICO_SDK_PATH: ${{ github.workspace }}/pico-sdk
        run: |
          mkdir -p app-controller/Firmware/RP2040/build
          cd app-controller/Firmware/RP2040/build
          cmake -DPICO_SDK_PATH=${PICO_SDK_PATH} -DCMAKE_BUILD_TYPE=Release -DMAX_GAMEPADS=1 ..
          cmake --build . -j$(nproc)
      - name: Rename output
        run: |
          cd app-controller/Firmware/RP2040/build
          cp $(find . -maxdepth 1 -name "*.uf2" | head -n 1) controller.uf2
      - name: Upload Controller UF2
        uses: actions/upload-artifact@v4
        with:
          name: controller-uf2
          path: app-controller/Firmware/RP2040/build/controller.uf2
          if-no-files-found: error

  build-audio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake gcc-arm-none-eabi libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib
      - name: Get Pico SDK
        run: git clone --branch ${{ env.PICO_SDK_VERSION }} --recurse-submodules https://github.com/raspberrypi/pico-sdk.git
      - name: Build App - Audio
        env:
          PICO_SDK_PATH: ${{ github.workspace }}/pico-sdk
        run: |
          mkdir -p app-audio/build
          cd app-audio/build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          cmake --build . -j$(nproc)
      - name: Rename output
        run: |
          cd app-audio/build
          cp $(find . -maxdepth 1 -name "*.uf2" | head -n 1) audio.uf2
      - name: Upload Audio UF2
        uses: actions/upload-artifact@v4
        with:
          name: audio-uf2
          path: app-audio/build/audio.uf2
          if-no-files-found: error

  combine:
    needs: [build-bootloader, build-controller, build-audio]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all parts
        uses: actions/download-artifact@v4
        with:
          path: parts/
      - name: Combine into single UF2
        run: |
          mkdir -p output
          python3 scripts/combine_uf2.py \
            --out output/OGX-Mini-Hybrid-PICO2W.uf2 \
            parts/bootloader-uf2/bootloader.uf2 \
            parts/controller-uf2/controller.uf2 \
            parts/audio-uf2/audio.uf2
      - name: Upload Combined UF2
        uses: actions/upload-artifact@v4
        with:
          name: OGX-Mini-Hybrid-PICO2W
          path: output/OGX-Mini-Hybrid-PICO2W.uf2
          if-no-files-found: error

  release:
    needs: combine
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Combined UF2
        uses: actions/download-artifact@v4
        with:
          name: OGX-Mini-Hybrid-PICO2W
          path: output
      - name: Create Release
        uses: softprops/action-gh-release@v2.2.2
        with:
          tag_name: latest
          draft: true
          files: output/OGX-Mini-Hybrid-PICO2W.uf2

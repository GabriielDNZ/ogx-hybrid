name: Build OGX-BT-Hybrid

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  PICO_SDK_VERSION: "2.1.0"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc-arm-none-eabi libnewlib-arm-none-eabi \
            libstdc++-arm-none-eabi-newlib python3

      - name: Get Pico SDK
        run: |
          git clone --branch ${{ env.PICO_SDK_VERSION }} --recurse-submodules \
            https://github.com/raspberrypi/pico-sdk.git

      - name: Get bluepad32 + btstack (versao compativel)
        run: |
          rm -rf external/bluepad32
          git clone https://github.com/ricardoquesada/bluepad32.git external/bluepad32
          # btstack: usar versao que tem hci_event_builder.c (v1.6.2+)
          # mas aplicar o patch do OGX-Mini no l2cap
          rm -rf external/bluepad32/external/btstack
          git clone --branch v1.6.2 --depth 1 \
            https://github.com/bluekitchen/btstack.git \
            external/bluepad32/external/btstack
          # Aplicar patch do l2cap (necessario para OGX-Mini)
          cd external/bluepad32/external/btstack
          patch -p1 < ${{ github.workspace }}/external/patches/btstack_l2cap.diff || true
          cd ${{ github.workspace }}
          # libfixmath e Pico-PIO-USB
          rm -rf external/libfixmath
          git clone https://github.com/PetteriAimonen/libfixmath.git external/libfixmath
          rm -rf external/Pico-PIO-USB
          git clone https://github.com/wiredopposite/Pico-PIO-USB.git external/Pico-PIO-USB

      - name: Build
        env:
          PICO_SDK_PATH: ${{ github.workspace }}/pico-sdk
        run: |
          mkdir -p build
          cd build
          cmake -DPICO_SDK_PATH=${PICO_SDK_PATH} \
                -DCMAKE_BUILD_TYPE=Release \
                ..
          cmake --build . -j$(nproc)
          echo "--- Arquivos gerados ---"
          find . -maxdepth 1 -name "*.uf2"

      - name: Upload UF2
        uses: actions/upload-artifact@v4
        with:
          name: OGX-BT-Hybrid-PICO2W
          path: build/*.uf2
          if-no-files-found: error
